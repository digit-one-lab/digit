name: New Post
about: Publish a new post from iPhone or iPad
title: "[Post] "
body:
  - type: input
    id: title
    attributes:
      label: Post title
      placeholder: My new post
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Short description
      placeholder: One short sentence shown on cards and search.
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma separated
      placeholder: Design, Notes, Publishing
    validations:
      required: false
  - type: textarea
    id: body
    attributes:
      label: Post body
      description: Markdown is allowed. Headings, paragraphs, and lists are fine.
      placeholder: Write your post here.
    validations:
      required: true
