name: Publish post from iOS issue

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to publish
        required: true

permissions:
  contents: write
  issues: write

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.issue.title, '[Post]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Publish from issue
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node scripts/publish-issue-post.mjs
      - name: Commit post
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/posts.json src/pages/posts
            git commit -m "Publish post from issue #${{ github.event.issue.number || inputs.issue_number }}"
            git push
          fi
      - name: Comment and close issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const n = context.issue.number;
            await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: n, body: 'Post published. GitHub Pages will redeploy automatically.'});
            await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: n, state: 'closed'});
